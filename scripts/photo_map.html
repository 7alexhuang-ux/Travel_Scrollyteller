
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>緬甸出差照片地圖索引</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-color: #f8f9fa;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
        }
        #app {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        #map {
            flex: 2;
            height: 100%;
        }
        #sidebar {
            flex: 1;
            background: white;
            border-left: 1px solid #ddd;
            overflow-y: auto;
            padding: 1.5rem;
            box-shadow: -2px 0 5px rgba(0,0,0,0.05);
        }
        .location-card {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
        }
        .location-card:hover {
            border-color: var(--accent-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .location-card h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.1rem;
            color: var(--primary-color);
        }
        .location-card p {
            margin: 0.2rem 0;
            font-size: 0.9rem;
            color: #666;
        }
        .badge {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .timestamp {
            font-family: monospace;
            color: #888;
        }
        .photo-preview {
            width: 100%;
            height: 120px;
            background-color: #eee;
            margin-top: 0.5rem;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.8rem;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div>
            <h1 style="margin:0; font-size: 1.5rem;">🇲🇲 緬甸出差足跡圖</h1>
            <span style="font-size: 0.8rem; opacity: 0.8;">基於 1/17 - 1/27 照片 GPS 採樣資料</span>
        </div>
        <div id="stats">
            正在載入資料...
        </div>
    </header>
    <div id="main">
        <div id="map"></div>
        <div id="sidebar">
            <h2 style="margin-top:0;">地點清單</h2>
            <div id="location-list">
                <!-- 由 JS 動態生成 -->
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 資料由後端填充或讀取 JSON
    const locations = [
        {
            "lat": 16.774,
            "lon": 96.16,
            "count": 4,
            "label": "Emmanuel Baptist Church 附近",
            "start_time": "2026:01:18 10:47:01",
            "sample_file": "IMG_0080.JPG"
        },
        {
            "lat": 16.781,
            "lon": 96.155,
            "count": 4,
            "label": "翁山市場 (Bogyoke Market) 附近",
            "start_time": "2026:01:24 14:15:46",
            "sample_file": "IMG_2205.JPG"
        },
        {
            "lat": 16.788,
            "lon": 96.142,
            "count": 9,
            "label": "仰光市中心 / 蘇雷塔區域",
            "start_time": "2026:01:25 10:05:50",
            "sample_file": "IMG_2400.JPG"
        },
        {
            "lat": 16.801,
            "lon": 96.158,
            "count": 3,
            "label": "大金寺 (Shwedagon Pagoda) 區域",
            "start_time": "2026:01:22 09:44:08",
            "sample_file": "IMG_1317.JPG"
        },
        {
            "lat": 16.875,
            "lon": 96.148,
            "count": 7,
            "label": "北仰光考察區",
            "start_time": "2026:01:20 16:21:46",
            "sample_file": "IMG_0895.JPG"
        }
    ];

    // 初始化地圖
    const map = L.map('map').setView([16.82, 96.15], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const locationList = document.getElementById('location-list');
    const stats = document.getElementById('stats');
    stats.innerHTML = `共計 81 個足跡點 | 顯示重點 5 處`;

    const markers = [];

    locations.forEach((loc, index) => {
        // 新增地圖標記
        const marker = L.marker([loc.lat, loc.lon]).addTo(map);
        marker.bindPopup(`<b>${loc.label}</b><br>照片檔案: ${loc.sample_file}<br>時間: ${loc.start_time}`);
        markers.push(marker);

        // 新增側邊欄卡片
        const card = document.createElement('div');
        card.className = 'location-card';
        card.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <h3>${loc.label}</h3>
                <span class="badge">${loc.count * 20} 張約略</span>
            </div>
            <p class="timestamp">🕒 ${loc.start_time}</p>
            <p>📁 代表檔名: ${loc.sample_file}</p>
            <div class="photo-preview" style="background-image: url('file:///C:/Project/Alex_Diary/inbox/緬甸/${loc.sample_file}')">
                <span>(預覽圖: ${loc.sample_file})</span>
            </div>
        `;
        card.onclick = () => {
            map.flyTo([loc.lat, loc.lon], 16);
            marker.openPopup();
        };
        locationList.appendChild(card);
    });

    // 如果資料夾中有更多資料，此處僅為展示
</script>
</body>
</html>
